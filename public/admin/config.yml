backend:
  name: git-gateway
  branch: main
  commit_messages:
    create: "Create {{collection}} “{{slug}}”"
    update: "Update {{collection}} “{{slug}}”"
    delete: "Delete {{collection}} “{{slug}}”"
    uploadMedia: "[skip ci] Upload “{{path}}”"
    deleteMedia: "[skip ci] Delete “{{path}}”"

local_backend: true
media_folder: public/img
public_folder: /img

collections:
  - name: pensieve
    label: Pensieve
    folder: src/content/pensieve
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Template Key, name: templateKey, widget: hidden, default: blog-post }
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text, required: false }
      - { label: Publish Date, name: date, widget: datetime }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - label: Kind
        name: kind
        widget: select
        default: note
        options: [note, essay, question, memory]
      - { label: Topics, name: topics, widget: list, required: false, default: [] }
      - { label: Last Updated, name: updated, widget: datetime, required: false }
      - { label: Thumbnail, name: thumbnail, widget: image, choose_url: false, required: false }
      - { label: Body, name: body, widget: markdown }

  - name: pages
    label: Pages
    files:
      - file: src/content/pages/index.md
        label: Home
        name: index
        fields:
          - { label: Template Key, name: templateKey, widget: hidden, default: index-page }
          - { label: Name, name: title, widget: string }
          - { label: SEO Description, name: description, widget: text }
          - { label: Opening Line, name: heading, widget: string }
          - { label: Garden Introduction, name: subheading, widget: text }
          - { label: Light Hero, name: heroImageLight, widget: image, choose_url: false }
          - { label: Dark Hero, name: heroImageDark, widget: image, choose_url: false, required: false }
          - { label: Hero Alt Text, name: heroImageAlt, widget: string }
          - { label: Body, name: body, widget: markdown }

      - file: src/content/pages/bio.md
        label: Bio
        name: bio
        fields:
          - { label: Template Key, name: templateKey, widget: hidden, default: bio-page }
          - { label: Date, name: date, widget: datetime, required: false }
          - { label: Title, name: title, widget: string }
          - { label: SEO Description, name: description, widget: text }
          - { label: Body, name: body, widget: markdown }

      - file: src/content/pages/work.md
        label: Work
        name: work
        fields:
          - { label: Template Key, name: templateKey, widget: hidden, default: bio-page }
          - { label: Date, name: date, widget: datetime, required: false }
          - { label: Title, name: title, widget: string }
          - { label: SEO Description, name: description, widget: text }
          - { label: Body, name: body, widget: markdown }

      - file: src/content/pages/pensieve.md
        label: Pensieve Index
        name: pensieve
        fields:
          - { label: Template Key, name: templateKey, widget: hidden, default: pensieve-page }
          - { label: Date, name: date, widget: datetime, required: false }
          - { label: Title, name: title, widget: string }
          - { label: Description, name: description, widget: text }
          - { label: Introduction, name: body, widget: markdown, required: false }
